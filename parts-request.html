<!DOCTYPE html>
<html>

<head>

<title>Parts Request</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

form{
background:rgb(4, 24, 247);
padding:20px;
max-width:400px;
margin:auto;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h2 style="text-align:center;">Request a G-Body Part</h2>

<form action="mailto:bcgbody2@gmail.com" method="post" enctype="text/plain">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Your Email</label>
<input type="email" name="email" required>

<label>Part You Need</label>
<textarea name="message" rows="5" placeholder="Example: Monte Carlo SS bumper, Cutlass dashboard, etc." required></textarea>

<button type="submit">Send Request</button>

</form>

</body>

</html>
